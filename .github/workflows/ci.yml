name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # kite-pdf is one crate with three build shapes selected by Cargo
      # features; each must compile on its own so the -chromium / -lite release
      # artifacts stay buildable.
      - name: Check kite-pdf feature combos
        run: |
          cargo check -p kite-pdf --all-targets
          cargo check -p kite-pdf --no-default-features --features chromium --all-targets
          cargo check -p kite-pdf --no-default-features --features typst --all-targets

      - name: Tests
        env:
          BROWSER_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
          BROWSER_NO_SANDBOX: "1"
        # Single-threaded: the e2e tests each spawn a server + Chromium, and
        # running many browsers in parallel exhausts CPU/RAM/shm on 2-core
        # shared CI runners (empty CDP responses / timeouts). Slower but stable.
        run: cargo test --workspace -- --test-threads=1

      # The Typst backend spawns no browser, so its tests must also pass in the
      # browser-free "-lite" build.
      - name: Test kite-pdf (typst-only, no browser)
        run: cargo test -p kite-pdf --no-default-features --features typst -- --test-threads=1

      - name: Release build
        run: cargo build --release -p kitewright

      - name: Release build (kite-pdf, all variants)
        run: |
          cargo build --release -p kite-pdf
          cargo build --release -p kite-pdf --no-default-features --features chromium
          cargo build --release -p kite-pdf --no-default-features --features typst

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Trivy scan (vuln + secret + misconfig)
        env:
          # Use a throwaway docker config so Trivy never hits an authenticated
          # registry when pulling its vuln DB (avoids rate-limit/401 flakes).
          DOCKER_CONFIG: ${{ runner.temp }}/trivy-docker
        run: |
          mkdir -p "$DOCKER_CONFIG"
          trivy fs \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --no-progress \
            --skip-dirs target \
            --skip-dirs bindings/node/node_modules \
            .
