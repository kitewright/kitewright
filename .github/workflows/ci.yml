name: CI

on:
  push:
    branches: [main]
  pull_request:
  # macOS runners bill at 10x minutes, so push/PR run ubuntu-only (see the
  # matrix expressions below); full cross-OS coverage runs nightly and on demand.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu (1x) on every push/PR; add macOS only on the nightly schedule
        # or a manual run.
        os: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && fromJSON('["ubuntu-latest", "macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # The workspace release build (kitewright + all three kite-pdf variants)
      # plus debug test artifacts and the aws-lc-sys C build exhaust the stock
      # runner disk ("No space left on device"). Reclaim ~25GB of preinstalled
      # toolchains we don't use before building.
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force || true
          df -h /
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # kite-pdf is one crate with three build shapes selected by Cargo
      # features; each must compile on its own so the -chromium / -lite release
      # artifacts stay buildable.
      - name: Check kite-pdf feature combos
        run: |
          cargo check -p kite-pdf --all-targets
          cargo check -p kite-pdf --no-default-features --features chromium --all-targets
          cargo check -p kite-pdf --no-default-features --features typst --all-targets

      - name: Tests
        env:
          # Blocking gate = everything deterministic. Real-browser tests
          # (engine integration + http e2e) are gated OUT here: on the shared
          # 2-core runner Chromium's renderer starves and returns empty output,
          # which is runner flakiness, not a product defect. They run in the
          # non-blocking `browser` job below (and locally by default).
          KITE_SKIP_BROWSER_E2E: "1"
        run: cargo test --workspace -- --test-threads=1

      # The Typst backend spawns no browser, so its tests must also pass in the
      # browser-free "-lite" build.
      - name: Test kite-pdf (typst-only, no browser)
        run: cargo test -p kite-pdf --no-default-features --features typst -- --test-threads=1

      - name: Release build
        run: cargo build --release -p kitewright

      - name: Release build (kite-pdf, all variants)
        run: |
          cargo build --release -p kite-pdf
          cargo build --release -p kite-pdf --no-default-features --features chromium
          cargo build --release -p kite-pdf --no-default-features --features typst

  # Real-browser tests (engine integration + http e2e) on both OSes. These
  # exercise a live Chrome and are prone to renderer starvation on shared
  # runners, so the job is INFORMATIONAL (continue-on-error) — it surfaces
  # regressions without blocking merges. They are the blocking gate locally.
  browser:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu (1x) on every push/PR; macOS only nightly / on demand (10x).
        os: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && fromJSON('["ubuntu-latest", "macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
      - name: Browser tests (engine + http e2e)
        env:
          BROWSER_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
          BROWSER_NO_SANDBOX: "1"
          # Runner has no display: kite is headed by default, so force headless.
          KITE_HEADLESS: "1"
        run: |
          cargo test -p kitewright-engine --test engine_test -- --test-threads=1
          cargo test -p kitewright --test http_test -- --test-threads=1
          cargo test -p kite-pdf --test chromium_test -- --test-threads=1
          cargo test -p kite-pdf --test http_test -- --test-threads=1

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Trivy scan (vuln + secret + misconfig)
        env:
          # Use a throwaway docker config so Trivy never hits an authenticated
          # registry when pulling its vuln DB (avoids rate-limit/401 flakes).
          DOCKER_CONFIG: ${{ runner.temp }}/trivy-docker
        run: |
          mkdir -p "$DOCKER_CONFIG"
          trivy fs \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --no-progress \
            --skip-dirs target \
            --skip-dirs bindings/node/node_modules \
            .
      - name: cargo audit (Rust dependency CVEs)
        run: |
          cargo install cargo-audit --locked || true
          # Reads .cargo/audit.toml (documented ignores). Fails on any
          # unignored vulnerability advisory.
          cargo audit
