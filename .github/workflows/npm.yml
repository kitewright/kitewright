name: npm (@kitewright/node)

# Build the @kitewright/node napi addon across the platform matrix and publish
# the per-platform prebuilt packages (@kitewright/node-<triple>) + the main
# package on a `v*` tag. napi-rs v3 flow: `napi build --platform` per target →
# upload each `.node` → `napi artifacts` moves them into npm/<triple>/ →
# `napi prepublish` publishes the platform packages → `npm publish` the main.
# Requires repo secret NPM_TOKEN (Automation token with @kitewright publish
# rights). NOTE: not yet run end-to-end — the first real run validates the matrix.
on:
  push:
    tags: ["node-v*"]
  workflow_dispatch:

defaults:
  run:
    working-directory: bindings/node

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          # Cross-compile x86_64 on Apple Silicon (macos-13 runners are scarce).
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/node
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build addon (${{ matrix.target }})
        run: npm run build -- -t ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          path: bindings/node/artifacts
      - name: Move .node files into per-platform npm dirs
        run: npx napi artifacts --output-dir artifacts --npm-dir npm
      - name: Publish (dry-run on manual dispatch)
        if: ${{ !startsWith(github.ref, 'refs/tags/node-v') }}
        run: npx napi prepublish --npm-dir npm -t npm --dry-run
      - name: Publish platform packages + main (on tag)
        if: ${{ startsWith(github.ref, 'refs/tags/node-v') }}
        run: |
          npx napi prepublish --npm-dir npm -t npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
