name: npm

# Build the @kitewright/node napi addon across the platform matrix (validation
# on every push/PR) and publish to npm on a version tag. The real publish is
# guarded: pushes and PRs only run `npm publish --dry-run`; a `v*` tag with
# NODE_AUTH_TOKEN set publishes for real.
#
# NOTE (multi-platform prebuilds — TODO): the publish job below ships a single
# host-platform build of @kitewright/node (the addon is bundled as
# `kitewright-node.node`, which the hand-written index.js loader requires
# directly). The napi `triples` + `optionalDependencies` in package.json are the
# scaffolding for the standard napi-rs per-triple prebuilt packages
# (@kitewright/node-<triple>); wiring their runtime resolution needs the
# generated binding.js loader as the entry point. Until then the matrix `build`
# job validates that the addon compiles on every target.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

defaults:
  run:
    working-directory: bindings/node

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/node
          key: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build addon
        run: npm run build

      - name: Upload prebuilt addon
        uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/node

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: npm ci

      - name: Build addon
        run: npm run build

      - name: Publish (dry-run)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm publish --dry-run --access public

      - name: Publish (release)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
